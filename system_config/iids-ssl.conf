# IIDS HTTPS Virtual Host — ST-09
# Port 8443 = HTTPS; port 8080 redirects to 8443

<VirtualHost *:8443>
    DocumentRoot /var/www/html/iids

    SSLEngine on
    SSLCertificateFile    /etc/apache2/ssl/iids/iids.crt
    SSLCertificateKeyFile /etc/apache2/ssl/iids/iids.key

    SSLProtocol all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite HIGH:!aNULL:!MD5:!3DES

    <Directory /var/www/html/iids>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog  ${APACHE_LOG_DIR}/iids_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/iids_ssl_access.log combined
</VirtualHost>

<VirtualHost *:8080>
    DocumentRoot /var/www/html/iids
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{SERVER_NAME}:8443%{REQUEST_URI} [R=301,L]
    <Directory /var/www/html/iids>
        AllowOverride All
        Require all granted
    </Directory>
    ErrorLog ${APACHE_LOG_DIR}/iids_error.log
    CustomLog ${APACHE_LOG_DIR}/iids_access.log combined
</VirtualHost>
